<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color:rgb(179, 237, 243);
            border: 5px solid black;
            
        }
        .box{
            width: 350px;
            height: 80px;
            background-color: blue;
            border-radius: 10px;
            margin: 10px;
            border: 5px solid yellow ;
            position: relative;
            animation-name: rightmovement;
            animation-direction: alternate;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            /* animation-delay: s; */
            animation-timing-function: linear;
           
        }
        @keyframes rightmovement{
        from    {
top: 0;
left: 0;
            }
            to{
top:0;
left: 1200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
<div class="box">
<H1 style="color: red;text-align: center;padding: 12px;">No signal</H3>
</div>
    </div>
</body>
</html>
