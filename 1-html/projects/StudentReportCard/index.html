<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Card</title>
</head>
<body>

    <!-- Header Section -->
    <header>

        <!-- School Logo -->
        <img src="school-logo.png" alt="School Logo" width="100">

        <h1>ABC Public School</h1>
        <h2>Student Report Card</h2>

    </header>

    <hr>

    <!-- Student Information -->
    <section>

        <p><strong>Name:</strong> Ashwani Raj</p>
        <p><strong>Roll No:</strong> 21</p>
        <p><strong>Class:</strong> BCA 1st Year</p>

    </section>

    <hr>

    <!-- Marks Table -->
    <table border="1" cellpadding="10">

        <!-- Table Heading -->
        <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>

        <!-- Row 1 -->
        <tr>
            <td>Mathematics</td>
            <td>88</td>
            <td>A</td>
        </tr>

        <!-- Row 2 -->
        <tr>
            <td>Computer Science</td>
            <td>95</td>
            <td>A+</td>
        </tr>

        <!-- Row 3 -->
        <tr>
            <td>English</td>
            <td>76</td>
            <td>B+</td>
        </tr>

        <!-- Row 4 -->
        <tr>
            <td>Physics</td>
            <td>82</td>
            <td>A</td>
        </tr>

    </table>

    <br>

    <!-- Download Report -->
    <a href="report.pdf" download>
        Download Report Card
    </a>

</body>
</html>
