<!DOCTYPE html>
<html lang="en">

<head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Contact Us</h1>

    <form>

        <!-- Name -->

        <label for="name">
            Full Name:
        </label>

        <br>

        <input
            type="text"
            id="name"
            required
        >

        <br><br>

        <!-- Email -->

        <label for="email">
            Email:
        </label>

        <br>

        <input
            type="email"
            id="email"
            required
        >

        <br><br>

        <!-- Message -->

        <label for="message">
            Message:
        </label>

        <br>

        <textarea
            id="message"
            rows="5"
            cols="30"
        ></textarea>

        <br><br>

        <button type="submit">
            Send Feedback
        </button>

    </form>

    <br>

    <a href="index.html">
        Back to Home
    </a>

</body>

</html>
