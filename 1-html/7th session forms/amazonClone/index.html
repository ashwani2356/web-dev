<!DOCTYPE html>
<html lang="en">

<head>
    <title>Amazon Home</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->

    <div class="navbar">

        <h1>Amazon Clone</h1>

        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign Up</a>

    </div>

    <!-- Main Container -->

    <div class="container">

        <!-- Search -->

        <div class="search-box">

            <input type="text" placeholder="Search Amazon">

            <button>Search</button>

        </div>

        <!-- Categories -->

        <div class="categories">

            <h2>Categories</h2>

            <ul>
                <li>Mobiles</li>
                <li>Fashion</li>
                <li>Electronics</li>
                <li>Books</li>
                <li>Home Appliances</li>
            </ul>

        </div>

        <!-- Products -->

        <h2>Top Products</h2>

        <table>

            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>Iphone 15</td>
                <td>₹70,000</td>
                <td>In Stock</td>
            </tr>

            <tr>
                <td>HP Laptop</td>
                <td>₹55,000</td>
                <td>In Stock</td>
            </tr>

            <tr>
                <td>Boat Headphones</td>
                <td>₹1,500</td>
                <td>Out of Stock</td>
            </tr>

        </table>

    </div>

    <!-- Footer -->

    <div class="footer">

        <p>Amazon Clone Project</p>

    </div>

</body>

</html>
