<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">MyProfile</div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Skills</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Profile Card -->
    <div class="card">

        <img src="https://i.pravatar.cc/200" alt="Profile Image">

        <h2>Ashwani Kumar</h2>

        <p class="role">Full Stack Developer</p>

        <p class="bio">
            Passionate about web development, coding, and building modern websites.
        </p>

        <div class="buttons">
            <button class="btn follow-btn">Follow</button>
            <button class="btn message-btn">Message</button>
        </div>

    </div>

</body>
</html>
