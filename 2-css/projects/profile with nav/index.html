<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Turret+Road:wght@200;300;400;500;700;800&display=swap" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">MyProfile</div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Skills</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Profile Card -->
    <div class="card">

        <img src="./WhatsApp Image 2026-02-13 at 6.05.52 PM.jpeg" alt="Profile Image">

        <h2>Ashwani Kumar</h2>

        <p class="role">Full Stack Developer</p>

        <p class="bio">
            Passionate about web development, coding, and building modern websites.
        </p>

        <div class="buttons">
            <button class="btn follow-btn">Follow</button>
            <button class="btn message-btn">Message</button>
        </div>

    </div>

</body>
</html>
